<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect
    // Stores the requested path in sessionStorage, then redirects to root.
    // The index.html script picks up the path and restores it via history.replaceState.
    // This avoids URL encoding issues that break the query-string approach.
    (function() {
      var l = window.location;
      sessionStorage.setItem('spa-redirect', l.pathname + l.search + l.hash);
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
    })();
  </script>
</head>
<body>
</body>
</html>
