version: 2
updates:
  # npm dependencies (bun uses npm registry)
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "17:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    assignees:
      - "philcarbone"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    ignore:
      # Angular 22 pins TypeScript to ">=6.0 <6.1" (see @angular/compiler-cli /
      # @angular/build peerDependencies). TS 6.1+ / 7.x break `ng build`
      # ("Cannot read properties of undefined (reading 'Error')"), so keep TypeScript on
      # 6.0.x until an Angular upgrade widens the supported range. Revisit when bumping Angular.
      - dependency-name: "typescript"
        versions: [">=6.1.0"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "17:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    assignees:
      - "philcarbone"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
