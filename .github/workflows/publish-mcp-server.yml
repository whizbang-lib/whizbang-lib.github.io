name: Publish MCP Server to npm

# Publishes @whizbang/docs-mcp-server via npm Trusted Publishing (OIDC) — NO
# stored token. The version is derived from the Whizbang library's latest
# published nuget release (revision-aware, so a docs-only re-release for the
# same library version bumps a `.N` suffix instead of colliding).
#
# Trigger: manual (Run workflow). Requires a Trusted Publisher configured on the
# npm package: npmjs.com → @whizbang/docs-mcp-server → Settings → Trusted
# Publisher → GitHub Actions, whizbang-lib/whizbang-lib.github.io,
# publish-mcp-server.yml, "Allow npm publish". No NPM_TOKEN secret is used.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-docs-server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing needs npm >= 11.5.1; the runner's bundled npm
      # can lag, so pin the latest.
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Derive version from latest published library
        run: |
          V=$(node scripts/derive-version.mjs)
          echo "Publishing @whizbang/docs-mcp-server@$V (tracks library release)"
          npm version "$V" --no-git-tag-version --allow-same-version

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Bundle docs snapshot
        run: npm run bundle-assets

      - name: Smoke test
        run: npm test

      # No NODE_AUTH_TOKEN: npm detects the GitHub OIDC environment and exchanges
      # it for a short-lived credential via the configured Trusted Publisher.
      # Prerelease versions require an explicit --tag; whizbang is all-prerelease
      # so `latest` resolves to the newest build.
      - name: Publish (Trusted Publishing / OIDC)
        run: npm publish --provenance --access public --tag latest
