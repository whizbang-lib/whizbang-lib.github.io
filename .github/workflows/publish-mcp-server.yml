name: Publish MCP Server to npm

# Tag-driven release: push a tag like mcp-v1.1.0 (must match
# mcp-docs-server/package.json version). Builds, bundles a docs snapshot,
# and publishes to npm via Trusted Publishing (OIDC) — NO stored token.
#
# Prerequisites (one-time, after the package's first publish exists):
#   1. On npmjs.com, open the @whizbang/docs-mcp-server package → Settings →
#      Trusted Publisher → add: repository whizbang-lib/whizbang-lib.github.io,
#      workflow file publish-mcp-server.yml (environment left blank).
#   2. Delete the NPM_TOKEN repo secret + revoke the npm token — no longer used.
# Provenance is attached automatically by trusted publishing.

on:
  push:
    tags:
      - 'mcp-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-docs-server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing needs npm >= 11.5.1; the runner's bundled npm
      # can lag behind, so pin the latest.
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#mcp-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION != package.json $PKG_VERSION"; exit 1
          fi

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Bundle docs snapshot
        run: npm run bundle-assets

      - name: Smoke test
        run: npm test

      # No NODE_AUTH_TOKEN: npm 11.5.1+ detects the GitHub OIDC environment and
      # exchanges it for a short-lived publish credential via the configured
      # Trusted Publisher. --provenance is implied but kept explicit.
      - name: Publish (Trusted Publishing / OIDC)
        run: npm publish --provenance --access public
