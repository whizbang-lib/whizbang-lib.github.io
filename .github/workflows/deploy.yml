name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/whizbang-site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-deployed:
    name: Notify Deployed
    needs: [ build, deploy ]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for action)
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions/notify-pushover

      - name: Send Pushover notification
        if: vars.PUSHOVER_ENABLED == 'true'
        uses: ./.github/actions/notify-pushover
        with:
          api-token: ${{ secrets.PUSHOVER_API_TOKEN }}
          user-key-1: ${{ secrets.PUSHOVER_USER_KEY_1 }}
          user-key-2: ${{ secrets.PUSHOVER_USER_KEY_2 }}
          user-key-3: ${{ secrets.PUSHOVER_USER_KEY_3 }}
          user-key-4: ${{ secrets.PUSHOVER_USER_KEY_4 }}
          user-key-5: ${{ secrets.PUSHOVER_USER_KEY_5 }}
          user-key-6: ${{ secrets.PUSHOVER_USER_KEY_6 }}
          user-key-7: ${{ secrets.PUSHOVER_USER_KEY_7 }}
          user-key-8: ${{ secrets.PUSHOVER_USER_KEY_8 }}
          user-key-9: ${{ secrets.PUSHOVER_USER_KEY_9 }}
          user-key-10: ${{ secrets.PUSHOVER_USER_KEY_10 }}
          title: '[DOCS] Site Deployed'
          message: 'GitHub Pages deployment complete'
          status: deployed
          url: 'https://whizbang-lib.github.io'
          url-title: 'View Site'

  notify-deploy-failed:
    name: Notify Deploy Failed
    needs: [ build, deploy ]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for action)
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions/notify-pushover

      - name: Send Pushover notification
        if: vars.PUSHOVER_ENABLED == 'true'
        uses: ./.github/actions/notify-pushover
        with:
          api-token: ${{ secrets.PUSHOVER_API_TOKEN }}
          user-key-1: ${{ secrets.PUSHOVER_USER_KEY_1 }}
          user-key-2: ${{ secrets.PUSHOVER_USER_KEY_2 }}
          user-key-3: ${{ secrets.PUSHOVER_USER_KEY_3 }}
          user-key-4: ${{ secrets.PUSHOVER_USER_KEY_4 }}
          user-key-5: ${{ secrets.PUSHOVER_USER_KEY_5 }}
          user-key-6: ${{ secrets.PUSHOVER_USER_KEY_6 }}
          user-key-7: ${{ secrets.PUSHOVER_USER_KEY_7 }}
          user-key-8: ${{ secrets.PUSHOVER_USER_KEY_8 }}
          user-key-9: ${{ secrets.PUSHOVER_USER_KEY_9 }}
          user-key-10: ${{ secrets.PUSHOVER_USER_KEY_10 }}
          title: '[DOCS] Deploy FAILED'
          message: 'GitHub Pages deployment failed'
          status: deploy-failed
          url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          url-title: 'View Build'
