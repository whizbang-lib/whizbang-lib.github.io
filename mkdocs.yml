site_name: Whizbang Documentation
site_url: https://whizbang.readthedocs.io/
site_description: >-
  Documentation for Whizbang - a zero-reflection, AOT-compatible .NET library
  for building event-driven, CQRS, and event-sourced applications.
repo_url: https://github.com/whizbang-lib/whizbang
repo_name: whizbang-lib/whizbang

theme:
  name: material
  custom_dir: rtd/overrides
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - announce.dismiss

docs_dir: rtd/_build/docs

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

